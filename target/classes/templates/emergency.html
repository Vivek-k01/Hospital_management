<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Emergency Contacts | Lifeline HMS</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #fff5f5; margin: 0; padding: 40px; }
        .emergency-header { color: #d32f2f; font-weight: bold; text-transform: uppercase; display: flex; align-items: center; gap: 10px; }
        .back-btn { text-decoration: none; color: #d32f2f; font-weight: bold; display: block; margin-bottom: 20px; }
        
        .emergency-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .emergency-card { 
            background: white; border-radius: 12px; padding: 25px; 
            border-left: 8px solid #d32f2f; box-shadow: 0 4px 15px rgba(211, 47, 47, 0.1);
            transition: 0.3s;
        }
        .emergency-card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(211, 47, 47, 0.2); }
        .service-name { font-size: 20px; color: #333; margin-bottom: 10px; font-weight: bold; }
        .phone-number { font-size: 24px; color: #d32f2f; font-weight: bold; margin: 15px 0; display: block; }
        .status-badge { background: #ffebee; color: #d32f2f; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <a th:href="@{/}" class="back-btn">← Back to Dashboard</a>
    
    <div class="emergency-header">
        <span style="font-size: 40px;">🚨</span>
        <h2>Emergency Contact Directory</h2>
    </div>

    <div class="emergency-grid">
        <div class="emergency-card" th:each="contact : ${listEmergency}">
            <div class="service-name" th:text="${contact.service_name}">Ambulance</div>
            <span class="status-badge" th:text="${contact.availability}">Available 24/7</span>
            <span class="phone-number" th:text="${contact.contact_number}">+91 99999 11111</span>
            <div style="font-size: 13px; color: #666;">Click to call from mobile</div>
        </div>
    </div>
</body>
</html>
